name: lms
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  chewie: ^1.13.0
  collection: ^1.19.1
  cupertino_icons: ^1.0.8
  device_info_plus: ^12.3.0
  dio: ^5.9.0
  equatable: ^2.0.8
  fl_chart: ^1.1.1
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_bloc: ^9.1.1
  flutter_localizations:
    sdk: flutter
  flutter_secure_storage: ^9.2.2
  flutter_svg: ^2.2.3
  freezed_annotation: ^3.1.0
  get_it: ^9.2.0
  go_router: ^17.0.1
  intl: any
  json_annotation: ^4.9.0
  mime: ^2.0.0
  path: ^1.9.1
  pretty_dio_logger: ^1.4.0
  shared_preferences: ^2.5.4
  smooth_page_indicator: ^2.0.1
  toastification: ^3.0.3
  url_launcher: ^6.3.2
  video_player: ^2.10.1
  youtube_player_flutter: ^9.1.1
  firebase_core: ^3.11.0
  firebase_auth: ^5.5.0
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.1.1
  webview_flutter: ^4.10.0
  flutter_widget_from_html: ^0.17.1


dev_dependencies:
  build_runner: ^2.10.5
  flutter_flavorizr: ^2.4.1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.4
  json_serializable: ^6.11.4
  retrofit_generator: ^10.2.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/svgs/
    - assets/fonts/cairo/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/cairo/Cairo-Black.ttf
        - asset: assets/fonts/cairo/Cairo-Bold.ttf
        - asset: assets/fonts/cairo/Cairo-ExtraBold.ttf
        - asset: assets/fonts/cairo/Cairo-ExtraLight.ttf
        - asset: assets/fonts/cairo/Cairo-Light.ttf
        - asset: assets/fonts/cairo/Cairo-Medium.ttf
        - asset: assets/fonts/cairo/Cairo-Regular.ttf
        - asset: assets/fonts/cairo/Cairo-SemiBold.ttf
